<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Propiedades</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef7 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 15px;
            opacity: 0.9;
        }

        .form-content {
            padding: 25px 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        .required {
            color: #e74c3c;
            margin-left: 4px;
        }

        input[type="text"],
        input[type="number"],
        input[type="tel"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 16px 14px;
            font-size: 18px;
            border: 2px solid #e0e6f2;
            border-radius: 12px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8fafb;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="tel"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        .input-group input {
            flex: 1;
        }

        .input-unit {
            font-size: 16px;
            color: #7f8c8d;
            display: flex;
            align-items: center;
            padding-right: 4px;
            font-weight: 500;
        }

        /* Sección de imágenes */
        .image-section {
            background: #f8fafb;
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-section:hover {
            background: #f0f3ff;
            border-color: #764ba2;
        }

        .image-section input[type="file"] {
            display: none;
        }

        .image-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .image-text {
            font-size: 17px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .image-subtext {
            font-size: 15px;
            color: #95a5a6;
        }

        .image-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .image-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #ecf0f1;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-remove {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 28px;
            height: 28px;
            background: rgba(231, 76, 60, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Botones */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-submit:active {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .btn-reset:active {
            background: #d5dbdb;
        }

        /* Mensajes */
        .message {
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background: #d5f4e6;
            color: #27ae60;
            border-left: 4px solid #27ae60;
        }

        .message.error {
            background: #fadbd8;
            color: #c0392b;
            border-left: 4px solid #c0392b;
        }

        .message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #ecf0f1;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .section-divider {
            height: 1px;
            background: #e0e6f2;
            margin: 30px 0;
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .form-content {
                padding: 20px 16px;
            }

            label {
                font-size: 17px;
            }

            input[type="text"],
            input[type="number"],
            select,
            textarea {
                font-size: 18px;
                padding: 14px 12px;
            }

            .two-columns {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            button {
                padding: 16px 20px;
                font-size: 17px;
            }
        }

        .info-text {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Nueva Propiedad</h1>
            <p>Completa todos los detalles</p>
        </div>

        <div class="form-content">
            <div class="message" id="message"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 12px; color: #667eea; font-size: 16px;">Enviando...</p>
            </div>

            <form id="propertyForm">
                <!-- TIPO DE PROPIEDAD -->
                <div class="form-group">
                    <label>Tipo de Propiedad <span class="required">*</span></label>
                    <select name="tipoPropiedad" required>
                        <option value="">Selecciona un tipo</option>
                        <option value="casa">Casa</option>
                        <option value="departamento">Departamento</option>
                        <option value="terreno">Terreno</option>
                        <option value="lote">Lote</option>
                        <option value="local">Local Comercial</option>
                        <option value="oficina">Oficina</option>
                        <option value="bodega">Bodega</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <!-- OPERACIÓN -->
                <div class="form-group">
                    <label>Tipo de Operación <span class="required">*</span></label>
                    <select name="operacion" required>
                        <option value="">Selecciona operación</option>
                        <option value="venta">Venta</option>
                        <option value="renta">Renta</option>
                        <option value="ambos">Venta y Renta</option>
                    </select>
                </div>

                <!-- PRECIO -->
                <div class="form-group">
                    <label>Precio <span class="required">*</span></label>
                    <div class="input-group">
                        <input type="number" name="precio" placeholder="0" min="0" required>
                        <div class="input-unit">MXN</div>
                    </div>
                    <div class="info-text">Precio total en pesos mexicanos</div>
                </div>

                <!-- ÁREA -->
                <div class="form-group">
                    <label>Área Total <span class="required">*</span></label>
                    <div class="input-group">
                        <input type="number" name="area" placeholder="0" min="0" step="0.01" required>
                        <div class="input-unit">m²</div>
                    </div>
                </div>

                <div class="section-divider"></div>

                <!-- UBICACIÓN -->
                <div class="form-group">
                    <label>Dirección <span class="required">*</span></label>
                    <input type="text" name="direccion" placeholder="Calle, número, referencias" required>
                </div>

                <div class="form-group">
                    <label>Colonia/Delegación <span class="required">*</span></label>
                    <input type="text" name="colonia" placeholder="Ej: Condado del Valle" required>
                </div>

                <div class="form-group">
                    <label>Municipio/Alcaldía <span class="required">*</span></label>
                    <input type="text" name="municipio" placeholder="Ej: Toluca" required>
                </div>

                <div class="form-group">
                    <label>Estado <span class="required">*</span></label>
                    <input type="text" name="estado" placeholder="Ej: Estado de México" required>
                </div>

                <div class="section-divider"></div>

                <!-- CARACTERÍSTICAS -->
                <div class="form-group" id="group-habitaciones">
                    <label>Habitaciones <span class="required">*</span></label>
                    <select name="habitaciones" id="habitaciones" required>
                        <option value="">Selecciona cantidad</option>
                        <option value="0">Estudio</option>
                        <option value="1">1 Habitación</option>
                        <option value="2">2 Habitaciones</option>
                        <option value="3">3 Habitaciones</option>
                        <option value="4">4 Habitaciones</option>
                        <option value="5">5+ Habitaciones</option>
                    </select>
                </div>

                <div class="form-group" id="group-banos">
                    <label>Baños <span class="required">*</span></label>
                    <select name="banos" id="banos" required>
                        <option value="">Selecciona cantidad</option>
                        <option value="1">1 Baño</option>
                        <option value="1.5">1.5 Baños</option>
                        <option value="2">2 Baños</option>
                        <option value="2.5">2.5 Baños</option>
                        <option value="3">3 Baños</option>
                        <option value="3.5">3.5 Baños</option>
                        <option value="4">4+ Baños</option>
                    </select>
                </div>

                <div class="form-group" id="group-estacionamientos">
                    <label>Estacionamientos</label>
                    <select name="estacionamientos">
                        <option value="">Sin especificar</option>
                        <option value="0">Ninguno</option>
                        <option value="1">1 Estacionamiento</option>
                        <option value="2">2 Estacionamientos</option>
                        <option value="3">3 Estacionamientos</option>
                        <option value="4">4+ Estacionamientos</option>
                    </select>
                </div>

                <!-- DETALLES ADICIONALES -->
                <div class="form-group">
                    <label>Año de Construcción</label>
                    <input type="number" name="anio" placeholder="Ej: 2020" min="1900" max="2099">
                </div>

                <div class="form-group">
                    <label>Piso (si aplica)</label>
                    <input type="text" name="piso" placeholder="Ej: Planta Baja, 3er Piso">
                </div>

                <div class="form-group">
                    <label>Estado de la Propiedad <span class="required">*</span></label>
                    <select name="estadoPropiedad" required>
                        <option value="">Selecciona estado</option>
                        <option value="nuevo">Nuevo</option>
                        <option value="en_construccion">En Construcción</option>
                        <option value="remodelado">Remodelado</option>
                        <option value="usado">Usado</option>
                        <option value="restaurado">Restaurado</option>
                    </select>
                </div>

                <div class="section-divider"></div>

                <!-- DESCRIPCIÓN -->
                <div class="form-group">
                    <label>Descripción/Detalles <span class="required">*</span></label>
                    <textarea name="descripcion" placeholder="Describe los detalles principales, características especiales, amenidades, etc." required></textarea>
                </div>

                <!-- AMENIDADES -->
                <div class="form-group">
                    <label>Amenidades</label>
                    <textarea name="amenidades" placeholder="Piscina, gimnasio, seguridad, vigilancia, etc."></textarea>
                </div>

                <div class="section-divider"></div>

                <!-- IMÁGENES -->
                <div class="form-group">
                    <label>Imágenes de la Propiedad <span class="required">*</span></label>
                    <div class="image-section" onclick="document.getElementById('imageInput').click()">
                        <div class="image-icon">📷</div>
                        <div class="image-text">Toca para añadir fotos</div>
                        <div class="image-subtext">Elige de tu Galería (múltiples OK)</div>
                    </div>
                    <input type="file" id="imageInput" name="imagenes" accept="image/*" multiple>
                    <div class="image-preview" id="imagePreview"></div>
                </div>

                <!-- BOTONES -->
                <div class="button-group">
                    <button type="reset" class="btn-reset">Limpiar</button>
                    <button type="submit" class="btn-submit">Enviar Propiedad</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('propertyForm');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const messageDiv = document.getElementById('message');
        const loadingDiv = document.getElementById('loading');

        let selectedFiles = [];

        // Mostrar/ocultar campos según tipo de propiedad
        const NO_INDOOR = ['terreno', 'lote'];
        document.querySelector('[name="tipoPropiedad"]').addEventListener('change', function() {
            const hide = NO_INDOOR.includes(this.value);
            ['group-habitaciones', 'group-banos', 'group-estacionamientos'].forEach(id => {
                document.getElementById(id).style.display = hide ? 'none' : '';
            });
            document.getElementById('habitaciones').required = !hide;
            document.getElementById('banos').required = !hide;
        });

        // Manejo de imágenes
        imageInput.addEventListener('change', function(e) {
            selectedFiles = Array.from(e.target.files);
            displayPreviews();
        });

        function displayPreviews() {
            imagePreview.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const item = document.createElement('div');
                    item.className = 'image-item';
                    item.innerHTML = `
                        <img src="${e.target.result}" alt="Imagen ${index + 1}">
                        <button type="button" class="image-remove" onclick="removeImage(${index})">✕</button>
                    `;
                    imagePreview.appendChild(item);
                };
                reader.readAsDataURL(file);
            });
        }

        function removeImage(index) {
            selectedFiles.splice(index, 1);
            displayPreviews();
        }

        // Validación y envío
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validar imágenes
            if (selectedFiles.length === 0) {
                showMessage('Debes añadir al menos una imagen', 'error');
                return;
            }

            if (selectedFiles.length > 30) {
                showMessage('Máximo 30 imágenes por propiedad', 'error');
                return;
            }

            showLoading(true);

            try {
                // Collect form fields
                const fields = [
                    'tipoPropiedad', 'operacion', 'precio', 'area', 'direccion',
                    'colonia', 'municipio', 'estado', 'habitaciones', 'banos',
                    'estacionamientos', 'anio', 'piso', 'estadoPropiedad',
                    'descripcion', 'amenidades'
                ];

                const payload = {};
                fields.forEach(field => {
                    const input = form.elements[field];
                    if (input) payload[field] = input.value || '';
                });

                // Compress + convert images to base64
                const toBase64 = (file) => new Promise((resolve) => {
                    const img = new Image();
                    const url = URL.createObjectURL(file);
                    img.onload = () => {
                        const MAX = 3000;
                        let w = img.width, h = img.height;
                        if (w > MAX || h > MAX) {
                            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                            else { w = Math.round(w * MAX / h); h = MAX; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const data = canvas.toDataURL('image/jpeg', 0.97).split(',')[1];
                        URL.revokeObjectURL(url);
                        resolve({ name: file.name.replace(/\.[^.]+$/, '.jpg'), type: 'image/jpeg', data });
                    };
                    img.src = url;
                });

                payload.imagenes = await Promise.all(selectedFiles.map(toBase64));

                const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzneA2KzIuSY-Emirp5NZq5jtctpQRE2OAAMTF8wstdldmtvDGTBYIPftOJn9NaC6kncg/exec';

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.result === 'success') {
                    showMessage('✅ ¡Propiedad enviada correctamente! Los datos se están organizando en carpetas.', 'success');
                    form.reset();
                    selectedFiles = [];
                    imagePreview.innerHTML = '';
                    window.scrollTo(0, 0);
                } else {
                    showMessage('❌ Error: ' + (result.mensaje || 'Intenta de nuevo.'), 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} show`;
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 5000);
        }

        function showLoading(show) {
            if (show) {
                loadingDiv.classList.add('show');
            } else {
                loadingDiv.classList.remove('show');
            }
        }

        // Validación en tiempo real para números
        form.elements.precio.addEventListener('input', function(e) {
            this.value = Math.max(0, this.value);
        });

        form.elements.area.addEventListener('input', function(e) {
            this.value = Math.max(0, this.value);
        });
    </script>
</body>
</html>
