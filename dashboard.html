<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROPIEDADES_</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Share+Tech&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #ff0000;
      --white: #ffffff;
      --gray: #888888;
      --dark: #111111;
      --card: #0a0a0a;
      --border: #222222;
    }

    body {
      background: #000;
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* DOT GRID BACKGROUND */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px; }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      font-size: 22px;
      letter-spacing: 4px;
      color: var(--white);
      text-transform: uppercase;
    }
    .logo span { color: var(--red); }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 2px;
    }
    .dot-live {
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,0,0,0.4); }
      50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(255,0,0,0); }
    }
    .cursor {
      display: inline-block;
      width: 10px; height: 18px;
      background: var(--red);
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* STATS */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin: 24px 0;
    }
    .stat {
      background: #000;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-label {
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .stat-value {
      font-size: 36px;
      color: var(--white);
      line-height: 1;
    }
    .stat-value.red { color: var(--red); }
    .stat-sub {
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 1px;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }
    .filter-label {
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 3px;
      margin-right: 4px;
    }
    select, input[type="text"] {
      background: #000;
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 8px 12px;
      letter-spacing: 1px;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }
    select:focus, input[type="text"]:focus {
      border-color: var(--red);
    }
    select option { background: #111; }
    input[type="text"]::placeholder { color: var(--border); }
    .btn-refresh {
      background: var(--red);
      border: none;
      color: #000;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 8px 16px;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s;
      margin-left: auto;
    }
    .btn-refresh:hover { opacity: 0.8; }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    /* CARD */
    .card {
      background: var(--card);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .card:hover { background: #0f0f0f; }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 2px; height: 0;
      background: var(--red);
      transition: height 0.3s;
    }
    .card:hover::before { height: 100%; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .badge {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--red);
      color: var(--red);
    }
    .badge-op {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--border);
      color: var(--gray);
    }

    .price {
      font-size: 28px;
      color: var(--white);
      letter-spacing: 1px;
      line-height: 1;
    }
    .price-sub {
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .location {
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .location-main {
      font-size: 14px;
      color: var(--white);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .location-sub {
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 1px;
    }

    .specs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .spec {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .spec-val {
      font-size: 18px;
      color: var(--white);
    }
    .spec-lbl {
      font-size: 9px;
      color: var(--gray);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .timestamp {
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 1px;
    }
    .link-drive {
      font-size: 10px;
      color: var(--red);
      letter-spacing: 2px;
      text-decoration: none;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .link-drive:hover { opacity: 0.7; }

    .desc {
      font-size: 11px;
      color: var(--gray);
      line-height: 1.6;
      letter-spacing: 0.5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* EMPTY / LOADING */
    .state-box {
      grid-column: 1 / -1;
      background: var(--card);
      padding: 80px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .loading-dots span {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      margin: 0 3px;
      animation: bounce 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .state-msg {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .state-err { color: var(--red); }

    /* COUNT BAR */
    .count-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .count-bar strong { color: var(--white); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 0;
      margin-top: 48px;
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 2px;
    }

    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .stat-value { font-size: 28px; }
      .filters { gap: 6px; }
      select, input[type="text"] { font-size: 11px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">PROPIEDADES<span>_</span><span class="cursor"></span></div>
      <div class="status">
        <div class="dot-live"></div>
        <span id="status-text">CONECTANDO...</span>
      </div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat">
      <div class="stat-label">TOTAL</div>
      <div class="stat-value red" id="s-total">—</div>
      <div class="stat-sub">PROPIEDADES</div>
    </div>
    <div class="stat">
      <div class="stat-label">VENTA</div>
      <div class="stat-value" id="s-venta">—</div>
      <div class="stat-sub">REGISTROS</div>
    </div>
    <div class="stat">
      <div class="stat-label">RENTA</div>
      <div class="stat-value" id="s-renta">—</div>
      <div class="stat-sub">REGISTROS</div>
    </div>
    <div class="stat">
      <div class="stat-label">HOY</div>
      <div class="stat-value" id="s-hoy">—</div>
      <div class="stat-sub">NUEVAS</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <span class="filter-label">FILTRAR //</span>
    <select id="f-tipo">
      <option value="">TIPO: TODOS</option>
    </select>
    <select id="f-op">
      <option value="">OPERACIÓN: TODAS</option>
    </select>
    <select id="f-mun">
      <option value="">MUNICIPIO: TODOS</option>
    </select>
    <input type="text" id="f-search" placeholder="BUSCAR..." style="width:180px">
    <button class="btn-refresh" onclick="loadData()">↺ ACTUALIZAR</button>
  </div>

  <!-- COUNT -->
  <div class="count-bar">
    <span>MOSTRANDO <strong id="count-shown">0</strong> DE <strong id="count-total">0</strong> PROPIEDADES</span>
    <span id="last-update">—</span>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid">
    <div class="state-box">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="state-msg">Cargando datos...</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <span>SISTEMA DE PROPIEDADES // v1.0</span>
      <span id="footer-date">—</span>
    </div>
  </footer>

</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzneA2KzIuSY-Emirp5NZq5jtctpQRE2OAAMTF8wstdldmtvDGTBYIPftOJn9NaC6kncg/exec';

  let allData = [];

  function fmt(price) {
    if (!price) return '—';
    const n = parseFloat(String(price).replace(/[^0-9.]/g, ''));
    if (isNaN(n)) return price;
    return '$' + n.toLocaleString('es-MX');
  }

  function fmtDate(val) {
    if (!val) return '—';
    const d = new Date(val);
    if (isNaN(d)) return val;
    return d.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }

  function isToday(val) {
    const d = new Date(val);
    const n = new Date();
    return d.toDateString() === n.toDateString();
  }

  function populateFilters(data) {
    const tipos = [...new Set(data.map(r => r['Tipo de Propiedad']).filter(Boolean))];
    const ops   = [...new Set(data.map(r => r['Operación']).filter(Boolean))];
    const muns  = [...new Set(data.map(r => r['Municipio']).filter(Boolean))];

    const fTipo = document.getElementById('f-tipo');
    const fOp   = document.getElementById('f-op');
    const fMun  = document.getElementById('f-mun');

    tipos.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t.toUpperCase(); fTipo.appendChild(o); });
    ops.forEach(t =>   { const o = document.createElement('option'); o.value = t; o.textContent = t.toUpperCase(); fOp.appendChild(o); });
    muns.forEach(t =>  { const o = document.createElement('option'); o.value = t; o.textContent = t.toUpperCase(); fMun.appendChild(o); });
  }

  function updateStats(data) {
    const venta = data.filter(r => (r['Operación'] || '').toLowerCase().includes('venta')).length;
    const renta = data.filter(r => (r['Operación'] || '').toLowerCase().includes('renta')).length;
    const hoy   = data.filter(r => isToday(r['Timestamp'])).length;

    document.getElementById('s-total').textContent = data.length;
    document.getElementById('s-venta').textContent = venta;
    document.getElementById('s-renta').textContent = renta;
    document.getElementById('s-hoy').textContent   = hoy;
  }

  function renderCards(data) {
    const grid = document.getElementById('grid');

    document.getElementById('count-shown').textContent = data.length;
    document.getElementById('count-total').textContent = allData.length;

    if (data.length === 0) {
      grid.innerHTML = `
        <div class="state-box">
          <div class="state-msg">SIN RESULTADOS</div>
        </div>`;
      return;
    }

    grid.innerHTML = data.map(r => {
      const tipo   = r['Tipo de Propiedad'] || '—';
      const op     = r['Operación'] || '—';
      const precio = fmt(r['Precio']);
      const colonia = r['Colonia'] || '—';
      const dir    = r['Dirección'] || '';
      const mun    = r['Municipio'] || '';
      const estado = r['Estado'] || '';
      const habs   = r['Habitaciones'] || '—';
      const banos  = r['Baños'] || '—';
      const autos  = r['Estacionamientos'] || '—';
      const area   = r['Área (m²)'] ? r['Área (m²)'] + 'm²' : '—';
      const desc   = r['Descripción'] || '';
      const link   = r['Carpeta Drive'] || '#';
      const ts     = fmtDate(r['Timestamp']);

      return `
      <div class="card">
        <div class="card-top">
          <span class="badge">${tipo}</span>
          <span class="badge-op">${op}</span>
        </div>
        <div>
          <div class="price">${precio}</div>
          <div class="price-sub">MXN</div>
        </div>
        <div class="location">
          <div class="location-main">${colonia}</div>
          <div class="location-sub">${[dir, mun, estado].filter(Boolean).join(' · ')}</div>
        </div>
        ${desc ? `<div class="desc">${desc}</div>` : ''}
        <div class="specs">
          <div class="spec"><div class="spec-val">${habs}</div><div class="spec-lbl">HABS</div></div>
          <div class="spec"><div class="spec-val">${banos}</div><div class="spec-lbl">BAÑOS</div></div>
          <div class="spec"><div class="spec-val">${autos}</div><div class="spec-lbl">AUTOS</div></div>
          <div class="spec"><div class="spec-val" style="font-size:13px">${area}</div><div class="spec-lbl">ÁREA</div></div>
        </div>
        <div class="card-footer">
          <span class="timestamp">${ts}</span>
          ${link !== '#' ? `<a class="link-drive" href="${link}" target="_blank">VER DRIVE →</a>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function applyFilters() {
    const tipo   = document.getElementById('f-tipo').value.toLowerCase();
    const op     = document.getElementById('f-op').value.toLowerCase();
    const mun    = document.getElementById('f-mun').value.toLowerCase();
    const search = document.getElementById('f-search').value.toLowerCase();

    const filtered = allData.filter(r => {
      if (tipo && (r['Tipo de Propiedad'] || '').toLowerCase() !== tipo) return false;
      if (op   && (r['Operación'] || '').toLowerCase() !== op) return false;
      if (mun  && (r['Municipio'] || '').toLowerCase() !== mun) return false;
      if (search) {
        const haystack = [r['Colonia'], r['Municipio'], r['Estado'], r['Dirección'], r['Descripción'], r['Tipo de Propiedad']].join(' ').toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    renderCards(filtered);
  }

  ['f-tipo', 'f-op', 'f-mun', 'f-search'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
    document.getElementById(id).addEventListener('input', applyFilters);
  });

  async function loadData() {
    document.getElementById('status-text').textContent = 'SINCRONIZANDO...';
    document.getElementById('grid').innerHTML = `
      <div class="state-box">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="state-msg">Cargando datos...</div>
      </div>`;

    try {
      const res = await fetch(`${SCRIPT_URL}?action=getData`);
      const json = await res.json();

      if (json.result !== 'success') throw new Error(json.mensaje);

      allData = json.data || [];

      updateStats(allData);
      populateFilters(allData);
      applyFilters();

      const now = new Date();
      const ts = now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('last-update').textContent = 'ÚLTIMA SYNC: ' + ts;
      document.getElementById('footer-date').textContent = now.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
      document.getElementById('status-text').textContent = 'EN LÍNEA';

    } catch (err) {
      document.getElementById('status-text').textContent = 'ERROR';
      document.getElementById('grid').innerHTML = `
        <div class="state-box">
          <div class="state-msg state-err">ERROR AL CARGAR DATOS</div>
          <div class="state-msg" style="font-size:10px">${err.message}</div>
        </div>`;
    }
  }

  loadData();
</script>

</body>
</html>
